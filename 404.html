<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>404 — Page Not Found — Stackly Construction</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700;800;900&display=swap"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    body {
      background: var(--black, #0b0b0b);
      color: var(--white, #ffffff);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      position: relative;
    }

    /* Blueprint grid background */
    .blueprint-bg {
      position: absolute;
      inset: 0;
      background-image: 
        linear-gradient(rgba(201, 169, 110, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(201, 169, 110, 0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      z-index: 1;
    }

    .error-container {
      position: relative;
      z-index: 2;
      text-align: center;
      max-width: 600px;
      padding: 40px 24px;
    }

    /* Live Crane Animation */
    .animation-box {
      width: 280px;
      height: 240px;
      margin: 0 auto 30px;
      position: relative;
    }

    .crane-svg {
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    /* Rotating gears and blinking lights */
    .gear {
      transform-origin: 50px 170px;
      animation: rotateGear 12s linear infinite;
    }
    .gear-slow {
      transform-origin: 50px 170px;
      animation: rotateGearRev 18s linear infinite;
    }

    @keyframes rotateGear {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    @keyframes rotateGearRev {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(-360deg); }
    }

    /* Swinging hook/beam */
    .crane-arm {
      transform-origin: 50px 80px;
      animation: armSway 6s ease-in-out infinite alternate;
    }

    @keyframes armSway {
      0% { transform: rotate(-3deg); }
      100% { transform: rotate(5deg); }
    }

    .hook-cables {
      transform-origin: 190px 80px;
      animation: cableSway 6s ease-in-out infinite alternate;
    }

    @keyframes cableSway {
      0% { transform: rotate(3deg) translateX(-2px); }
      100% { transform: rotate(-5deg) translateX(3px); }
    }

    .blinking-warning {
      fill: #ff3333;
      animation: blinkLight 1.5s step-end infinite;
    }

    @keyframes blinkLight {
      0%, 100% { opacity: 0.2; }
      50% { opacity: 1; }
    }

    /* Swaying 404 block */
    .crane-load {
      transform-origin: 190px 150px;
      animation: loadSway 6s ease-in-out infinite alternate;
    }

    @keyframes loadSway {
      0% { transform: rotate(4deg) translate(-5px, -1px); }
      100% { transform: rotate(-6deg) translate(6px, 1px); }
    }

    /* Text details */
    .error-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 32px;
      letter-spacing: 4px;
      color: var(--gold, #c9a96e);
      margin-bottom: 12px;
    }

    .error-desc {
      font-size: 15px;
      color: var(--grey-2, #b0b0b0);
      margin-bottom: 36px;
      line-height: 1.6;
    }

    /* Buttons block */
    .btn-row {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .btn-404-outline {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 28px;
      border: 1px solid var(--border, rgba(255,255,255,0.07));
      color: var(--white, #ffffff);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      border-radius: 2px;
      cursor: pointer;
      transition: all 0.35s;
      background: rgba(255, 255, 255, 0.02);
      backdrop-filter: blur(10px);
    }

    .btn-404-outline:hover {
      border-color: var(--gold, #c9a96e);
      color: var(--gold, #c9a96e);
      background: rgba(201, 169, 110, 0.05);
      transform: translateY(-2px);
    }

    .btn-404-solid {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 28px;
      background: var(--gold, #c9a96e);
      color: var(--black, #0b0b0b);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
      border-radius: 2px;
      border: none;
      cursor: pointer;
      transition: all 0.35s;
    }

    .btn-404-solid:hover {
      background: var(--white, #ffffff);
      color: var(--black, #0b0b0b);
      transform: translateY(-2px);
    }
  </style>
</head>
<body>

<div class="blueprint-bg"></div>

<div class="error-container">
  <!-- Interactive Construction Animation -->
  <div class="animation-box">
    <svg class="crane-svg" viewBox="0 0 240 220">
      <!-- Grid blue construction sketch lines -->
      <line x1="20" y1="210" x2="220" y2="210" stroke="rgba(201,169,110,0.15)" stroke-width="1" stroke-dasharray="3 3" />
      <line x1="50" y1="20" x2="50" y2="210" stroke="rgba(201,169,110,0.15)" stroke-width="1" stroke-dasharray="3 3" />
      <line x1="190" y1="20" x2="190" y2="210" stroke="rgba(201,169,110,0.15)" stroke-width="1" stroke-dasharray="3 3" />
      
      <!-- Tower crane body -->
      <rect x="46" y="80" width="8" height="130" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
      <!-- Internal truss structure -->
      <path d="M 46,210 L 54,200 L 46,190 L 54,180 L 46,170 L 54,160 L 46,150 L 54,140 L 46,130 L 54,120 L 46,110 L 54,100 L 46,90 L 54,80" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
      
      <!-- Base gears -->
      <circle cx="50" cy="170" r="12" fill="none" stroke="var(--gold)" stroke-width="1.5" class="gear" stroke-dasharray="4 2"/>
      <circle cx="50" cy="170" r="6" fill="none" stroke="var(--gold)" stroke-width="1" class="gear-slow" stroke-dasharray="3 1"/>
      
      <!-- Crane Arm (Jib) - Swaying -->
      <g class="crane-arm">
        <!-- Counterweight -->
        <rect x="10" y="72" width="20" height="12" fill="var(--gold)" opacity="0.8"/>
        <!-- Main arm structure -->
        <path d="M 10,78 L 220,78 L 50,70 Z" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
        <!-- Arm truss grid -->
        <path d="M 50,70 L 70,78 L 90,70 L 110,78 L 130,70 L 150,78 L 170,70 L 190,78 L 210,70" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
        <!-- Cab -->
        <rect x="54" y="72" width="12" height="12" fill="none" stroke="var(--white)" stroke-width="1.5"/>
        <!-- Blinking Warning light -->
        <circle cx="50" cy="66" r="3" fill="#ff3333" class="blinking-warning"/>
        
        <!-- Cable and Hook assemblies -->
        <g class="hook-cables">
          <!-- Hook Line -->
          <line x1="190" y1="78" x2="190" y2="135" stroke="var(--white)" stroke-width="1"/>
          <!-- Pulley -->
          <circle cx="190" cy="138" r="4" fill="none" stroke="var(--gold)" stroke-width="1.5"/>
          
          <!-- Swaying Load ( girder with 404 text ) -->
          <g class="crane-load">
            <!-- Cable slings -->
            <line x1="190" y1="142" x2="175" y2="160" stroke="var(--white)" stroke-width="0.8"/>
            <line x1="190" y1="142" x2="205" y2="160" stroke="var(--white)" stroke-width="0.8"/>
            <!-- Steel Girder -->
            <rect x="160" y="160" width="60" height="15" rx="2" fill="none" stroke="var(--gold)" stroke-width="1.5"/>
            <!-- Structural girder details -->
            <path d="M 160,167 L 220,167 M 165,160 L 175,175 M 185,160 L 175,175 M 185,160 L 195,175 M 205,160 L 195,175 M 205,160 L 215,175" fill="none" stroke="rgba(201,169,110,0.4)" stroke-width="0.8"/>
            <!-- Under construction tag -->
            <rect x="172" y="179" width="36" height="8" fill="#ff3333" rx="1"/>
            <text x="190" y="185" fill="var(--white)" font-size="6" font-family="'Inter', sans-serif" font-weight="900" text-anchor="middle" letter-spacing="0.5">404 ERROR</text>
          </g>
        </g>
      </g>
    </svg>
  </div>

  <h1 class="error-title">SITE ACCESS BLOCKED</h1>
  <p class="error-desc">
    The structural link you are trying to reach has either collapsed, been relocated, or is under active reconstruction by our engineers.
  </p>

  <div class="btn-row">
    <!-- Back to previous page, matching exact page position and scroll area -->
    <button class="btn-404-outline" onclick="history.back()"><i class="fa-solid fa-arrow-left"></i> Go Back</button>
    <!-- Back to landing homepage -->
    <a href="index.html" class="btn-404-solid"><i class="fa-solid fa-house"></i> Return Home</a>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    // Premium GSAP entrance animation for error elements
    gsap.from('.error-container > *', {
      y: 40,
      opacity: 0,
      duration: 0.8,
      stagger: 0.15,
      ease: 'power3.out'
    });
  });
</script>
</body>
</html>
